/* ── utilities ── */
const extractPDFText=async f=>{
  const buf=await f.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let txt='';
  for(let i=1;i<=Math.min(pdf.numPages,60);i++){
    const pg=await pdf.getPage(i);
    const c=await pg.getTextContent();
    txt+=`\n[Page ${i}]\n${c.items.map(x=>x.str).join(' ')}`;
  }
  return{text:txt,pages:pdf.numPages,charCount:txt.trim().length};
};
const readText=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error('Lecture impossible'));r.readAsText(f,'UTF-8');});
const callAPI=async payload=>{
  const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`Erreur ${res.status}`);}
  const data=await res.json();
  const raw=(data.content?.[0]?.text||data.text||'').trim();
  if(!raw)throw new Error('Réponse vide — réessayez.');
  const m=raw.match(/\{[\s\S]*\}/);
  if(!m)throw new Error('Format invalide.');
  let s=m[0].replace(/:\s*"((?:[^"\\]|\\.)*)"/g,(_,v)=>':"'+v.replace(/\n/g,'\\n').replace(/\r/g,'').replace(/\t/g,' ')+'"');
  try{return JSON.parse(s);}catch(e){const lb=s.lastIndexOf('}');if(lb>0){try{return JSON.parse(s.slice(0,lb+1));}catch(_){}}throw new Error('Réponse incomplète.');}
};
const fmtEur=n=>`${Math.round(n).toLocaleString('fr-FR')} €`;
const fmtK=n=>{const a=Math.abs(n);if(a>=1e6)return`${(n/1e6).toFixed(2).replace('.',',')} M€`;if(a>=1000)return`${Math.round(n/1000)} k€`;return`${Math.round(n)} €`;};
const parseAmt=s=>{if(!s)return 0;const n=parseFloat(String(s).replace(/[\s ]/g,'').replace(/[^\d.,-]/g,'').replace(',','.'));return isNaN(n)?0:Math.round(n);};

const DOC_TYPES=[
  {value:'bail',label:'Bail commercial'},{value:'ag',label:"PV d'assemblée générale"},
  {value:'copro',label:'Règlement de copropriété'},{value:'quittances',label:'Quittances de loyer'},

  {value:'autre',label:'Autre document'},

const STEPS=['Lecture et extraction des documents...','Consolidation des informations...',"Analyse des critères d'investissement...",'Calcul de la rentabilité...','Génération du rapport GO / NO-GO...'];

/* ── FINANCIAL ENGINE ── */
const computeFinancials=p=>{
  const{loyerMensuel,prixBien,prixNegocie,dureeCredit,apport,indexation,tva,tauxTVA=20,
    chargesCopro,chargesCoproRefact=false,taxeFonciere,taxeFonciereRefact,tauxInteret,tauxAssuranceCredit,
    pretInFine,fraisCreationSociete,fraisDossierBancaire,fraisCourtage,
    comptabiliteAnnuelle,assurancePNE,gestionLocativePct,chargesDiverses,
    travauxBailleur,anneeRevente,honoraireAgentRevente,rendementBrutAcquereur,
    vacanceLocative=0,surface=0,
    commissionAgentActive=true,commissionAgentType='pct',tauxCommissionAgent=5,commissionAgentInclusFAI=true,
    tauxDroitsEnregistrement=8,
    feesBailByeType='pct',tauxFeesBailBye=8,tauxIncentiveBailBye=20,
    revalorisationActive=false,loyerRevalorise=0,anneeRevalorisation=0,
    renegociationActive=false,anneeRenegociation=0,nouveauTauxRenegociation=0,moisIRA=6}=p;

  // Commission agent — fixe ou % du prix négocié, inclus dans le FAI ou en sus
  const honorairesAchat=commissionAgentActive?Math.round(commissionAgentType==='fixe'?tauxCommissionAgent:prixNegocie*tauxCommissionAgent/100):0;
  const honorairesEnSus=commissionAgentInclusFAI?0:honorairesAchat;
  const prixHorsDroits=commissionAgentInclusFAI?prixNegocie-honorairesAchat:prixNegocie;
  const droits=Math.round(prixHorsDroits*tauxDroitsEnregistrement/100);
  // Honoraires AI-CRE (fixe ou % du prix négocié) + prime négo (% de l'écart FAI/négocié)
  const feesBailBye=Math.round(feesBailByeType==='fixe'?tauxFeesBailBye:prixNegocie*tauxFeesBailBye/100);
  const primeNego=Math.round(Math.max(0,prixBien-prixNegocie)*tauxIncentiveBailBye/100);
  const honorairesBailByeMontant=feesBailBye+primeNego;
  const fraisDivers=fraisCreationSociete+fraisDossierBancaire+fraisCourtage;
  const budget=prixNegocie+droits+honorairesBailByeMontant+fraisDivers+honorairesEnSus;
  const credit=Math.max(0,budget-apport);
  let mr=tauxInteret/100/12;
  let nm=Math.max(1,dureeCredit*12);
  let echeanceMensuelle=pretInFine?(credit*mr):(mr>0?credit*mr/(1-Math.pow(1+mr,-nm)):credit/nm);
  const assuranceAnnuelle=Math.round(credit*tauxAssuranceCredit/100);
  const amortFiscal=Math.round(prixHorsDroits*0.80/25);
  const vacanceFactor=1-(vacanceLocative||0)/100;

  let capitalRestant=credit,deficitReporte=0,loyerBrutPrecedent=Math.round(loyerMensuel*12);
  const rows=[];
  for(let yr=1;yr<=25;yr++){
    let loyerBrutTheo=yr===1?Math.round(loyerMensuel*12):Math.round(loyerBrutPrecedent*(1+indexation/100));
    if(revalorisationActive&&yr===anneeRevalorisation&&loyerRevalorise>0)loyerBrutTheo=Math.round(loyerRevalorise);
    loyerBrutPrecedent=loyerBrutTheo;
    const loyerBrut=Math.round(loyerBrutTheo*vacanceFactor);
    const loyersNets=loyerBrut-(chargesCoproRefact?0:chargesCopro)-(taxeFonciereRefact?0:taxeFonciere);

    let interets=0,capital=0,ira=0;
    if(yr<=dureeCredit&&credit>0&&capitalRestant>0){
      if(pretInFine){
        interets=Math.round(capitalRestant*mr*12);
        capital=yr===dureeCredit?capitalRestant:0;
        capitalRestant=Math.max(0,capitalRestant-capital);
      }else if(renegociationActive&&yr===anneeRenegociation){
        let cap=capitalRestant;
        for(let m=0;m<12;m++){const i=cap*mr;const c=echeanceMensuelle-i;interets+=i;capital+=c;cap-=c;}
        interets=Math.round(interets);capital=Math.round(capital);
        ira=Math.round(interets*moisIRA/12);
        capitalRestant=Math.max(0,capitalRestant-capital);
        mr=nouveauTauxRenegociation/100/12;
        const nmRestant=Math.max(1,(dureeCredit-yr)*12);
        echeanceMensuelle=capitalRestant>0?(mr>0?capitalRestant*mr/(1-Math.pow(1+mr,-nmRestant)):capitalRestant/nmRestant):0;
      }else{
        let cap=capitalRestant;
        for(let m=0;m<12;m++){const i=cap*mr;const c=echeanceMensuelle-i;interets+=i;capital+=c;cap-=c;}
        interets=Math.round(interets);capital=Math.round(capital);
        capitalRestant=Math.max(0,capitalRestant-capital);
      }
    }
    const echeance=interets+capital;

    const baseGestion=loyerBrut-(chargesCoproRefact?chargesCopro:0)-(taxeFonciereRefact?taxeFonciere:0);
    const gestionLoc=Math.round(baseGestion*gestionLocativePct/100);
    const chargesHorsTravaux=gestionLoc+chargesDiverses+comptabiliteAnnuelle+assurancePNE;
    const chargesExploit=chargesHorsTravaux+travauxBailleur;

    const resFiscal=yr===1
      ?loyersNets-amortFiscal-interets-chargesExploit-(droits+honorairesBailByeMontant+fraisDivers)
      :loyersNets-amortFiscal-interets-chargesExploit+deficitReporte;
    let IS=0;
    if(resFiscal>0){IS=Math.round(Math.min(resFiscal,42500)*0.15+Math.max(0,resFiscal-42500)*0.25);deficitReporte=0;}
    else deficitReporte=resFiscal;

    let tvaNet=0;
    if(tva){
      const tvaCollectee=Math.round(loyerBrut*tauxTVA/100);
      const deductibleRecurrent=(gestionLoc+comptabiliteAnnuelle+assurancePNE+chargesDiverses+travauxBailleur)*tauxTVA/100;
      const deductibleAcquisition=yr===1?(honorairesBailByeMontant+honorairesEnSus+fraisDivers)*tauxTVA/100:0;
      const tvaDeductible=Math.round(deductibleRecurrent+deductibleAcquisition);
      tvaNet=Math.min(tvaCollectee,tvaDeductible);
    }

    const CF=loyersNets-echeance-assuranceAnnuelle-ira-chargesExploit-IS+tvaNet;
    const rendementLocatifNet=budget>0?(loyersNets/budget*100):0;
    rows.push({annee:yr,loyerBrut,loyerBrutTheo,loyersNets,interets,capital,echeance,ira,
      capitalRestant,chargesExploit,chargesHorsTravaux,gestionLoc,travauxPart:travauxBailleur,
      IS,tvaNet,CF,resFiscal:Math.round(resFiscal),rendementLocatifNet});
  }
  const revIdx=Math.min(anneeRevente,25)-1;
  const rev=rows[revIdx]||rows[24];
  const valRevente=rendementBrutAcquereur>0?Math.round(rev.loyersNets/(rendementBrutAcquereur/100)):0;
  const prixNet=Math.round(valRevente*(1-honoraireAgentRevente/100));
  const produitNet=prixNet-rev.capitalRestant;
  const totalCF=rows.slice(0,anneeRevente).reduce((s,r)=>s+r.CF,0);
  const cfMoisMoyen=Math.round(totalCF/anneeRevente/12);
  const creation=totalCF+produitNet;
  const wealthCreated=creation-apport;
  const multiple=apport>0?(creation/apport).toFixed(2):'—';
  const enrichAn=apport>0?Math.round(wealthCreated/anneeRevente):0;
  const tri=apport>0&&anneeRevente>0?((Math.pow(1+wealthCreated/apport,1/anneeRevente)-1)*100):0;
  const rendBrut=prixNegocie>0?((loyerMensuel*12/prixNegocie)*100).toFixed(2):'0';
  const rendYears=rows.slice(0,anneeRevente);
  const rendementLocatifGlobalNet=rendYears.length?rendYears.reduce((s,r)=>s+r.rendementLocatifNet,0)/rendYears.length:0;
  const amortissementsCumules=amortFiscal*Math.min(anneeRevente,25);
  const valeurNetComptable=Math.round(prixHorsDroits*0.8-amortissementsCumules);
  const loyerParM2=surface>0?Math.round(loyerMensuel*12/surface):0;
  const prixNetParM2=surface>0?Math.round(prixNet/surface):0;
  const vncParM2=surface>0?Math.round(valeurNetComptable/surface):0;
  const cumulData=[];let cum=0;
  for(let i=0;i<Math.min(anneeRevente,25);i++){
    cum+=rows[i].CF;
    cumulData.push({annee:rows[i].annee,v:i===Math.min(anneeRevente,25)-1?cum+produitNet:cum,isRevente:i===Math.min(anneeRevente,25)-1});
  }
  return{budget,credit,droits,fraisDivers,honorairesAchat,honorairesEnSus,honorairesBailByeMontant,feesBailBye,primeNego,
    prixHorsDroits,echeanceMensuelle:Math.round(echeanceMensuelle),
    assuranceAnnuelle,amortFiscal,rows,valRevente,prixNet,capRestantRevente:rev.capitalRestant,
    produitNet,tri:tri.toFixed(2),multiple,enrichAn,cfMoisMoyen,totalCF,creation,
    rendBrut,rendementLocatifGlobalNet,valeurNetComptable,loyerParM2,prixNetParM2,vncParM2,cumulData};
};

// Donut / Pie chart
const DonutChart=({fin,p})=>{
  const segs=[
    {l:'Prix négocié',v:p.prixNegocie,c:'#22d3a0'},
    ...(fin.honorairesEnSus>0?[{l:'Hon. agent (en sus)',v:fin.honorairesEnSus,c:'#8b5cf6'}]:[]),
    {l:'Droits enreg.',v:fin.droits,c:'#71ccba'},
    {l:'Hon. AI-CRE',v:fin.honorairesBailByeMontant,c:'#f59e0b'},
    {l:'Frais divers',v:fin.fraisDivers,c:'#ef4444'},
  ].filter(s=>s.v>0);
  const total=segs.reduce((s,x)=>s+x.v,0);
  if(!total)return null;
  const R=70,ri=42,cx=90,cy=90;
  const toXY=(r,ang)=>({x:cx+r*Math.cos((ang-90)*Math.PI/180),y:cy+r*Math.sin((ang-90)*Math.PI/180)});
  let ang=0;
  const paths=segs.map(s=>{
    const sweep=s.v/total*360;
    const a1=ang,a2=ang+sweep-0.5;
    ang+=sweep;
    const s1=toXY(R,a1),e1=toXY(R,a2),s2=toXY(ri,a2),e2=toXY(ri,a1);
    const large=sweep>180?1:0;
    const d=`M${s1.x} ${s1.y} A${R} ${R} 0 ${large} 1 ${e1.x} ${e1.y} L${s2.x} ${s2.y} A${ri} ${ri} 0 ${large} 0 ${e2.x} ${e2.y}Z`;
    return{...s,d,pct:(s.v/total*100).toFixed(1)};
  });
  return(
    <div style={{display:'flex',alignItems:'center',gap:28,flexWrap:'wrap'}}>
      <svg width={180} height={180} viewBox="0 0 180 180" style={{flexShrink:0}}>
        {paths.map((p,i)=><path key={i} d={p.d} fill={p.c} opacity={0.92}/>)}
        <circle cx={cx} cy={cy} r={ri-1} fill="#121212"/>
        <text x={cx} y={cy-8} textAnchor="middle" fill="#d0d0d0" fontSize={11} fontWeight={700} fontFamily="Inter,sans-serif">Prix de revient</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill="#ffffff" fontSize={13} fontWeight={900} fontFamily="Inter,sans-serif">{fmtK(total)}</text>
      </svg>
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:10}}>
        {paths.map((s,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:9,height:9,borderRadius:2,background:s.c,flexShrink:0}}/>
              <span style={{fontSize:11,color:'#909090'}}>{s.l}</span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:11,fontWeight:700,color:'#e0e0e0'}}>{fmtEur(s.v)}</span>
              <span style={{fontSize:10,color:'#555555'}}>{s.pct}%</span>
            </div>
          </div>
        ))}
        <div style={{marginTop:4,paddingTop:10,borderTop:'1px solid rgba(255,255,255,.05)',display:'flex',justifyContent:'space-between'}}>
          <span style={{fontSize:11,color:'#666666'}}>Total budget</span>
          <span style={{fontSize:12,fontWeight:800,color:'#ffffff'}}>{fmtEur(total)}</span>
        </div>
      </div>
    </div>
  );
};

const FONT='Montserrat,sans-serif';
const ChartWrap=({children})=>(
  <div style={{background:'#050505',borderRadius:10,padding:'20px 16px 12px',margin:'0 0 4px'}}>

const ChartLegend=({items})=>(

const mkGrid=(W,H,padL,padR,padT,ticks,toY,label)=>(
  <g>
    {/* y-axis label */}
    <text transform={`rotate(-90)`} x={-(padT+H/2)} y={10} textAnchor="middle" fontSize={8.5} fill="#666666" fontFamily={FONT}>{label}</text>
    {ticks.map((t,i)=>{
      const y=toY(t);
      return<g key={i}>
        <line x1={padL} x2={W-padR} y1={y} y2={y} stroke="rgba(255,255,255,.1)" strokeWidth={0.6} strokeDasharray="4 4"/>
        <text x={padL-6} y={y+4} textAnchor="end" fontSize={8} fill="#606060" fontFamily={FONT}>{typeof t==='number'&&Math.abs(t)>=1000?`${Math.round(t/1000)}`:t}</text>
      </g>;
    })}

);

// Création de richesse annuelle — grouped bars
const WealthAnnualChart=({rows,dureeCredit})=>{
  const data=rows.slice(0,Math.min(dureeCredit,25));
  const vals=data.map(r=>r.CF);
  const maxPos=Math.max(1,...vals.filter(v=>v>0));
  const maxNeg=Math.max(1,...vals.filter(v=>v<0).map(Math.abs));
  const W=580,H=200,padL=50,padR=10,padT=14,padB=32;
  const slot=(W-padL-padR)/data.length;
  const bw=Math.max(3,Math.floor(slot*0.65));
  // zero line sits proportionally between neg and pos regions
  const zeroY=padT+H*maxPos/(maxPos+maxNeg);
  const scaleUp=v=>H*v/(maxPos+maxNeg);
  const scaleDn=v=>H*v/(maxPos+maxNeg);
  // tick values spread across the full range
  const step=Math.ceil((maxPos+maxNeg)/4/1000)*1000||Math.ceil((maxPos+maxNeg)/4/100)*100||1;
  const ticks=[];
  for(let t=-Math.round(maxNeg/step)*step;t<=Math.round(maxPos/step)*step;t+=step)ticks.push(t);
  const toY=v=>v>=0?zeroY-scaleUp(v):zeroY+scaleDn(-v);
  return(
    <ChartWrap>
      <svg width="100%" viewBox={`0 0 ${W} ${H+padT+padB}`} style={{overflow:'visible'}}>
        {mkGrid(W,H,padL,padR,padT,ticks,toY,'(en milliers d\'euros)')}
        <line x1={padL} x2={W-padR} y1={zeroY} y2={zeroY} stroke="rgba(255,255,255,.3)" strokeWidth={1}/>
        {data.map((r,i)=>{
          const x=padL+i*slot+(slot-bw)/2;
          const pos=r.CF>=0;
          const h=Math.max(1.5,pos?scaleUp(r.CF):scaleDn(-r.CF));
          return<g key={i}>
            <rect x={x} y={pos?zeroY-h:zeroY} width={bw} height={h}
              fill={pos?'#22d3a0':'#ef4444'} opacity={0.85} rx={1.5}/>
            <text x={x+bw/2} y={H+padT+padB-4} textAnchor="middle" fontSize={8} fill="#606060" fontFamily={FONT}>{r.annee}</text>
          </g>;
        })}
        <text x={W/2} y={H+padT+padB+2} textAnchor="middle" fontSize={8.5} fill="#606060" fontFamily={FONT}>(année)</text>
      </svg>
      <ChartLegend items={[{color:'#22d3a0',label:'Cash-flow positif'},{color:'#ef4444',label:'Cash-flow négatif'}]}/>
    </ChartWrap>
  );
};

  const area=`M${toX(0)},${toY(0)} ${data.map((d,i)=>`L${toX(i)},${toY(d.v)}`).join(' ')} L${toX(data.length-1)},${toY(0)}Z`;

          {m1&&<circle cx={toX(data.indexOf(m1))} cy={toY(m1.v)} r={6} fill="#f97316" stroke="#050505" strokeWidth={2}/>}
          {m2&&<circle cx={toX(data.indexOf(m2))} cy={toY(m2.v)} r={6} fill="#818cf8" stroke="#050505" strokeWidth={2}/>}
          {data.map((d,i)=>(
            <text key={i} x={toX(i)} y={H+padT+padB-4} textAnchor="middle" fontSize={8} fill="#606060" fontFamily={FONT}>{d.annee}</text>
          ))}
          <text x={W/2} y={H+padT+padB+2} textAnchor="middle" fontSize={8.5} fill="#606060" fontFamily={FONT}>(année)</text>
        </svg>
        <div style={{display:'flex',justifyContent:'center',gap:7,marginTop:10}}>
          <div style={{display:'flex',alignItems:'center',gap:5}}>

          </div>
        </div>
      </ChartWrap>
      {(m1||m2)&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:10}}>
          {m1&&(
            <div style={{background:'#121212',border:'1px solid rgba(255,255,255,.06)',borderRadius:10,padding:'13px 15px',display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:'#f97316',flexShrink:0,marginTop:2}}/>
              <div><div style={{fontSize:11,fontWeight:700,color:'#ffffff',fontFamily:FONT}}>Récupération de l'apport</div><div style={{fontSize:10,color:'#777777',marginTop:3,fontFamily:FONT}}>Année {m1.annee} — vous récupérez {fmtEur(apport)}</div></div>
            </div>

            <div style={{background:'#121212',border:'1px solid rgba(255,255,255,.06)',borderRadius:10,padding:'13px 15px',display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:'#818cf8',flexShrink:0,marginTop:2}}/>
              <div><div style={{fontSize:11,fontWeight:700,color:'#ffffff',fontFamily:FONT}}>Double de l'apport</div><div style={{fontSize:10,color:'#777777',marginTop:3,fontFamily:FONT}}>Année {m2.annee} — vous atteignez {fmtEur(apport*2)}</div></div>

// Amortissement stacked chart
const AmortChart=({rows,dureeCredit})=>{
  const data=rows.filter(r=>r.annee<=dureeCredit&&(r.interets>0||r.capital>0));
  if(!data.length)return<div style={{color:'#444444',fontSize:12,textAlign:'center',padding:32}}>Pas de crédit</div>;
  const maxV=Math.max(...data.map(r=>r.interets+r.capital));
  const W=580,H=190,padL=46,padR=10,padT=14,padB=32;
  const slot=(W-padL-padR)/data.length;
  const bw=Math.max(3,slot*0.62);
  const scaleH=v=>H*v/Math.max(1,maxV);
  const tickVals=[0,Math.round(maxV/3),Math.round(maxV*2/3),Math.round(maxV)];
  const toY=v=>padT+H-scaleH(v);
  return(
    <ChartWrap>
      <svg width="100%" viewBox={`0 0 ${W} ${H+padT+padB}`} style={{overflow:'visible'}}>
        {mkGrid(W,H,padL,padR,padT,tickVals,toY,'(en milliers d\'euros)')}
        {data.map((r,i)=>{
          const x=padL+i*slot+(slot-bw)/2;
          const hCap=scaleH(r.capital),hInt=scaleH(r.interets);
          const yBase=padT+H;
          return<g key={i}>
            <rect x={x} y={yBase-hCap} width={bw} height={Math.max(1,hCap)} fill="#22d3a0" rx={1.5}/>
            <rect x={x} y={yBase-hCap-hInt} width={bw} height={Math.max(1,hInt)} fill="#c9a227" rx={1.5}/>
            {i%5===0&&<text x={x+bw/2} y={H+padT+padB-4} textAnchor="middle" fontSize={8} fill="#606060" fontFamily={FONT}>{r.annee}</text>}
          </g>;
        })}
        <text x={W/2} y={H+padT+padB+2} textAnchor="middle" fontSize={8.5} fill="#606060" fontFamily={FONT}>(année)</text>
      </svg>
      <ChartLegend items={[{color:'#22d3a0',label:'Capital remboursé'},{color:'#c9a227',label:'Intérêts'}]}/>
    </ChartWrap>
  );
};

// Rendement locatif net area chart
const RendChart=({rows,prixNegocie,chargesCopro,taxeFonciere,taxeFonciereRefact,dureeCredit})=>{
  const tf=taxeFonciereRefact?0:taxeFonciere;
  const data=rows.slice(0,Math.min(dureeCredit,25)).map(r=>({annee:r.annee,rend:(r.loyerBrut-chargesCopro-tf)/Math.max(1,prixNegocie)*100}));
  const vals=data.map(d=>d.rend);
  const minV=Math.max(0,Math.min(...vals)-0.5);
  const maxV=Math.max(...vals)+0.5;
  const range=Math.max(0.01,maxV-minV);
  const W=580,H=190,padL=44,padR=10,padT=14,padB=32;
  const toX=i=>padL+(W-padL-padR)*i/(data.length-1||1);
  const toY=v=>padT+H-(v-minV)/range*H;
  const tickVals=[minV,minV+range*0.25,minV+range*0.5,minV+range*0.75,maxV];
  const pts=data.map((d,i)=>`${toX(i)},${toY(d.rend)}`).join(' ');
  const area=`M${toX(0)},${toY(minV)} ${data.map((d,i)=>`L${toX(i)},${toY(d.rend)}`).join(' ')} L${toX(data.length-1)},${toY(minV)}Z`;
  return(
    <ChartWrap>
      <svg width="100%" viewBox={`0 0 ${W} ${H+padT+padB}`}>
        <defs><linearGradient id="rg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#c9a227" stopOpacity="0.4"/><stop offset="100%" stopColor="#c9a227" stopOpacity="0.02"/></linearGradient></defs>
        {mkGrid(W,H,padL,padR,padT,tickVals.map(v=>parseFloat(v.toFixed(1))),toY,'rendement net (%)')}
        <path d={area} fill="url(#rg2)"/>
        <polyline points={pts} fill="none" stroke="#c9a227" strokeWidth={2.2} strokeLinejoin="round"/>
        {data.filter((_,i)=>i%5===0||i===data.length-1).map((d,i)=>(
          <text key={i} x={toX(data.indexOf(d))} y={H+padT+padB-4} textAnchor="middle" fontSize={8} fill="#606060" fontFamily={FONT}>An {d.annee}</text>
        ))}
        <text x={W/2} y={H+padT+padB+2} textAnchor="middle" fontSize={8.5} fill="#606060" fontFamily={FONT}>(année)</text>
      </svg>
      <ChartLegend items={[{color:'#c9a227',label:'Rendement locatif net'}]}/>
    </ChartWrap>
  );
};

/* ── DETAILED TABLE ── */
const DetailedTable=({fin,p})=>{
  const rows=fin.rows;
  const capitalRembCumul=[];let cum=0;rows.forEach(r=>{cum+=r.capital;capitalRembCumul.push(cum);});
  const dash='—';
  const pos=(v,f)=>v>0?(f?f(v):fmtEur(v)):dash;
  const signed=(v)=>(v>=0?'+':'')+fmtEur(v);
  const pct=(v)=>v.toFixed(2)+'%';
  const [openSecs,setOpenSecs]=useState({});

    {title:'CASH-FLOW & PATRIMOINE',rows:[
      {label:'Cash-flow / an',vals:rows.map(r=>signed(r.CF)),dynamic:true,bold:true},

  const getCellColor=(row,val,yr)=>{

  return(

                      <span style={{fontSize:8,color:'#555',fontWeight:400,textTransform:'none',letterSpacing:0}}>({sec.rows.length} lignes)</span>

                    {row.vals.map((val,yi)=>{
                      const clr=getCellColor(row,val,yi);

                    })}

                )):[])

            })}

      </div>

  );
};

/* ── SIMULATOR PRIMITIVES ── */
const SliderRow=({label,value,min,max,step,unit,onChange,sub})=>{
  const[editing,setEditing]=useState(false);
  const[tmp,setTmp]=useState('');
  const pct=((value-min)/(max-min)*100).toFixed(1);
  const disp=unit==='€'?fmtEur(value):unit==='%'?`${parseFloat(value.toFixed(2))} %`:`${value} ${unit}`;
  const commit=()=>{
    let n=parseFloat(String(tmp).replace(/\s/g,'').replace(',','.').replace(/[^\d.-]/g,''));
    if(!isNaN(n))onChange(Math.max(min,Math.min(max,n)));
    setEditing(false);
  };
  return(
    <div style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5}}>
        <span style={{fontSize:11,color:'#888888'}}>{label}</span>
        {editing?(
          <input autoFocus type="text" inputMode="decimal" value={tmp}
            onChange={e=>setTmp(e.target.value)}
            onBlur={commit}
            onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape')setEditing(false);}}
            style={{width:84,textAlign:'right',background:'#0d0d14',border:'1px solid rgba(201,162,39,.45)',borderRadius:6,color:'#ffffff',fontSize:13,fontWeight:700,padding:'2px 7px',fontFamily:'inherit',outline:'none'}}/>
        ):(
          <span onClick={()=>{setTmp(String(value));setEditing(true);}} title="Cliquer pour saisir une valeur"
            style={{fontSize:13,fontWeight:700,color:'#ffffff',letterSpacing:'-0.3px',cursor:'text',borderBottom:'1px dashed rgba(255,255,255,.22)',paddingBottom:1}}>{disp}</span>
        )}
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))}
        style={{background:`linear-gradient(to right,#c9a227 ${pct}%,#1a1a1a ${pct}%)`}}/>
      {sub&&<div style={{fontSize:10,color:'#505050',marginTop:3}}>{sub}</div>}
    </div>
  );
};

  const iL=prefill?.loyerAnnuel?Math.max(300,Math.round(parseAmt(prefill.loyerAnnuel)/12)):4000;

/* ── LANDING ── */
const Landing=({onAnalyze,onDemo})=>{
  const [docs,setDocs]=useState([]);const [extra,setExtra]=useState('');const [over,setOver]=useState(false);const [loading,setLoading]=useState(false);const [err,setErr]=useState('');
  const inputRef=useRef();
  const addFiles=files=>{const arr=Array.from(files).filter(f=>f.type==='application/pdf'||f.name.endsWith('.txt')||f.name.endsWith('.pdf'));setDocs(prev=>[...prev,...arr.map(f=>({file:f,type:'bail',id:Math.random(),warn:null}))]);};
  const handleAnalyze=async()=>{
    if(!docs.length&&!extra.trim()){setErr('Ajoutez au moins un document ou des informations.');return;}
    setLoading(true);setErr('');
    try{
      const documents=[];const upd=[...docs];
      for(let i=0;i<docs.length;i++){
        const d=docs[i];let txt,warn=null;
        if(d.file.name.endsWith('.txt')){txt=await readText(d.file);}
        else{const r=await extractPDFText(d.file);txt=r.text;if(r.charCount<80){warn=r.charCount===0?`PDF scanné — aucun texte extrait. Collez le contenu manuellement.`:`Extraction partielle (${r.charCount} car.). PDF encodé de façon inhabituelle.`;txt=r.charCount>0?txt:`[PDF non extractible — ${r.pages} pages]`;}}
        upd[i]={...d,warn};documents.push({type:d.type,filename:d.file.name,text:txt.slice(0,60000)});
      }

    }catch(e){setErr(e.message);setLoading(false);}
  };

    <div style={{minHeight:'calc(100vh - 54px)',display:'flex',flexDirection:'column',alignItems:'center',padding:'52px 24px 60px'}}>

          <Ic n="zap" s={10} c="#c9a227"/>Analyse bail commercial · Rapport GO / NO-GO

        <h1 style={{fontSize:'clamp(24px,3.5vw,42px)',fontWeight:900,color:'#ffffff',letterSpacing:'-1.5px',lineHeight:1.08,margin:'0 0 14px'}}>Analysez votre projet<br/><span style={{color:'#c9a227'}}>d'investissement en 60 secondes.</span></h1>
        <p style={{fontSize:14,color:'#888888',lineHeight:1.75}}>Déposez vos documents — bail, PV d'AG, règlement de copro, quittances, diagnostics — et obtenez un <strong style={{color:'#c0c0c0',fontWeight:600}}>verdict analytique GO / NO-GO</strong> et une simulation financière interactive.</p>
        <button onClick={onDemo} style={{marginTop:18,display:'inline-flex',alignItems:'center',gap:8,background:'rgba(234,88,12,.1)',border:'1px solid rgba(234,88,12,.35)',borderRadius:10,padding:'9px 18px',cursor:'pointer',fontSize:12,color:'#f97316',fontFamily:'inherit',transition:'all .15s'}}
          onMouseOver={e=>{e.currentTarget.style.background='rgba(234,88,12,.18)';e.currentTarget.style.borderColor='rgba(234,88,12,.55)';}}
          onMouseOut={e=>{e.currentTarget.style.background='rgba(234,88,12,.1)';e.currentTarget.style.borderColor='rgba(234,88,12,.35)';}}>
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><polygon points="5,3 19,12 5,21"/></svg>
          Tester avec un exemple — bail commercial · local commercial Lyon
        </button>
      </div>
      <div style={{width:'100%',maxWidth:660}}>
        <div className="anim-fade" style={{background:'rgba(255,255,255,.025)',border:'1px solid rgba(255,255,255,.08)',borderRadius:12,padding:'14px 16px',marginBottom:14,display:'flex',flexDirection:'column',gap:7}}>
          <div style={{display:'flex',alignItems:'center',gap:7,fontSize:11.5,fontWeight:700,color:'#c9c9c9'}}><Ic n="lock" s={12} c="#c9a227"/>Confidentialité de vos documents</div>
          {[
            "Extraction du texte des PDF réalisée localement, dans votre navigateur, avant tout envoi.",
            "Documents transmis une seule fois, en connexion chiffrée (HTTPS), à l'API Claude (Anthropic) pour l'analyse, jamais stockés sur leurs serveurs.",
            "Aucune donnée utilisée pour entraîner un modèle, aucune revente à un tiers.",
          ].map((t,i)=><div key={i} style={{display:'flex',alignItems:'flex-start',gap:7}}><Ic n="check" s={10} c="#22d3a0"/><span style={{fontSize:11,color:'#999999',lineHeight:1.55}}>{t}</span></div>)}
        </div>
        <div className={`drag-zone anim-d1${over?' over':''}`} style={{border:`1.5px dashed ${over?'#c9a227':'rgba(255,255,255,.12)'}`,borderRadius:14,padding:'30px 24px',textAlign:'center',cursor:'pointer',background:'#111111',marginBottom:12}} onDragOver={e=>{e.preventDefault();setOver(true)}} onDragLeave={()=>setOver(false)} onDrop={e=>{e.preventDefault();setOver(false);addFiles(e.dataTransfer.files);}} onClick={()=>inputRef.current?.click()}>
          <input ref={inputRef} type="file" accept=".pdf,.txt" multiple style={{display:'none'}} onChange={e=>addFiles(e.target.files)}/>
          <div style={{width:42,height:42,borderRadius:11,background:'rgba(201,162,39,.08)',border:'1px solid rgba(201,162,39,.18)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}><Ic n="upload" s={19} c="#c9a227"/></div>
          <p style={{color:'#d8d8d8',fontSize:13,fontWeight:600,margin:'0 0 4px'}}>Glissez vos documents ici</p>

          {docs.map(d=>(

              <div className="doc-card" style={{background:'#111111',border:`1px solid ${d.warn?'rgba(245,158,11,.22)':'rgba(255,255,255,.07)'}`,borderRadius:d.warn?'9px 9px 0 0':9,padding:'10px 13px',display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:28,height:28,borderRadius:7,background:'rgba(201,162,39,.07)',border:'1px solid rgba(201,162,39,.14)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Ic n={d.warn?'alert':'doc'} s={12} c={d.warn?'#f59e0b':'#c9a227'}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,color:'#d8d8d8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:4}}>{d.file.name}</div>
                  <select value={d.type} onChange={e=>setDocs(ds=>ds.map(x=>x.id===d.id?{...x,type:e.target.value}:x))}>{DOC_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}</select>
                </div>
                <button onClick={()=>setDocs(ds=>ds.filter(x=>x.id!==d.id))} style={{background:'none',border:'none',cursor:'pointer',padding:4,opacity:.4}} onMouseOver={e=>e.currentTarget.style.opacity='1'} onMouseOut={e=>e.currentTarget.style.opacity='.4'}><Ic n="x" s={13} c="#777777"/></button>
              </div>
              {d.warn&&<div style={{background:'rgba(245,158,11,.04)',border:'1px solid rgba(245,158,11,.18)',borderTop:'none',borderRadius:'0 0 7px 7px',padding:'6px 12px',fontSize:10,color:'#b8892a'}}>⚠ {d.warn}</div>}

        </div>}

          <div style={{fontSize:11,color:'#888888',fontWeight:500,marginBottom:7}}>Informations complémentaires <span style={{color:'#555555'}}>(optionnel)</span></div>
          <textarea rows={4} value={extra} onChange={e=>setExtra(e.target.value)} placeholder={`Prix d'acquisition envisagé : 850 000 €\nLoyer mensuel : 5 200 €\nVille : Lyon 6ème\nRemarques : local en rez-de-chaussée...`}/>
        </div>
        {err&&<div style={{marginBottom:12,padding:'10px 13px',background:'rgba(239,68,68,.05)',border:'1px solid rgba(239,68,68,.18)',borderRadius:8,fontSize:12,color:'#ef4444'}}>{err}</div>}
        <button className="btn-p anim-d3" onClick={handleAnalyze} disabled={loading||(docs.length===0&&!extra.trim())} style={{width:'100%',borderRadius:11,padding:'14px',fontSize:14,fontWeight:700,color:'#080808',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {loading?<><div className="spin" style={{width:15,height:15,border:'2px solid rgba(0,0,0,.2)',borderTopColor:'#111',borderRadius:'50%'}}/>Lecture des documents...</>:<><Ic n="zap" s={14} c="#080808"/>Analyser le projet — GO / NO-GO</>}
        </button>
        <div className="anim-d3" style={{marginTop:18,display:'flex',gap:16,justifyContent:'center',flexWrap:'wrap'}}>
          {[{n:'lock',t:'Données non conservées'},{n:'shield',t:'Connexion chiffrée (HTTPS)'},{n:'euro',t:'~0.05€ / analyse'}].map((x,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'#666666'}}><Ic n={x.n} s={10} c="#555555"/>{x.t}</div>)}
        </div>
      </div>
    </div>
  );

/* ── LOADING ── */
const Loading=({payload,onComplete,onError})=>{
  const [idx,setIdx]=useState(0);const [done,setDone]=useState([]);const [pct,setPct]=useState(0);
  useEffect(()=>{
    const run=async()=>{
      try{
        setIdx(0);setPct(8);await new Promise(r=>setTimeout(r,600));
        setDone([0]);setIdx(1);setPct(25);await new Promise(r=>setTimeout(r,500));
        setDone([0,1]);setIdx(2);setPct(45);await new Promise(r=>setTimeout(r,700));
        const data=payload._demo?DEMO_DATA:await callAPI(payload);
        setDone([0,1,2]);setIdx(3);setPct(75);await new Promise(r=>setTimeout(r,payload._demo?600:400));
        setDone([0,1,2,3]);setIdx(4);setPct(95);await new Promise(r=>setTimeout(r,payload._demo?500:500));
        setPct(100);setDone([0,1,2,3,4]);setTimeout(()=>onComplete(data),400);
      }catch(e){onError(e.message);}
    };run();
  },[]);
  return(
    <div style={{minHeight:'calc(100vh - 54px)',display:'flex',alignItems:'center',justifyContent:'center',padding:40}}>
      <div className="anim-fade" style={{width:'100%',maxWidth:440}}>
        <div style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:14,padding:'18px 20px',marginBottom:20,display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:36,height:36,borderRadius:10,background:'rgba(201,162,39,.08)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Ic n="bldg" s={16} c="#c9a227"/></div>
          <div style={{flex:1}}><div style={{color:'#e0e0e0',fontSize:13,fontWeight:600,marginBottom:2}}>Analyse en cours...</div><div style={{color:'#606060',fontSize:11}}>{payload.documents.length} document{payload.documents.length>1?'s':''} · Claude Sonnet</div></div>
          <div className="spin"><Ic n="ref" s={14} c="#c9a227"/></div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}><span style={{fontSize:11,color:'#606060'}}>Progression</span><span style={{fontSize:11,color:'#c9a227',fontWeight:700}}>{pct}%</span></div>
          <div style={{background:'#1a1a20',borderRadius:99,height:3,overflow:'hidden'}}><div style={{height:'100%',borderRadius:99,width:`${pct}%`,background:'#c9a227',transition:'width .3s ease'}}/></div>
        </div>
        {STEPS.map((label,i)=>{const isDone=done.includes(i),isActive=idx===i&&!isDone;return(
          <div key={i} style={{display:'flex',alignItems:'center',gap:11,padding:'9px 0',borderBottom:i<4?'1px solid rgba(255,255,255,.04)':'none'}}>
            <div style={{width:18,height:18,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:isDone?'rgba(201,162,39,.1)':isActive?'rgba(201,162,39,.05)':'transparent',border:`1px solid ${isDone?'rgba(201,162,39,.3)':isActive?'rgba(201,162,39,.2)':'rgba(255,255,255,.06)'}`}}>
              {isDone?<Ic n="check" s={9} c="#c9a227"/>:isActive?<div className="pulse-dot" style={{width:4,height:4,borderRadius:'50%',background:'#c9a227'}}/>:<div style={{width:3,height:3,borderRadius:'50%',background:'#222222'}}/>}
            </div>
            <span style={{fontSize:12,color:isDone?'#c9a227':isActive?'#c0c0c0':'#2a2a40',fontWeight:isActive?500:400}}>{label}</span>
          </div>
        );})}
        <div style={{display:'flex',alignItems:'center',gap:7,marginTop:16,paddingTop:14,borderTop:'1px solid rgba(255,255,255,.04)'}}>
          <Ic n="lock" s={11} c="#555555"/>
          <span style={{fontSize:10.5,color:'#666666'}}>Vos documents sont transmis une seule fois pour cette analyse, jamais conservés.</span>
        </div>
      </div>
    </div>
  );
};

  {label:'Copropriété saine',detail:"Aucune procédure judiciaire en cours, pas d'impayés de charges significatifs, pas de travaux votés importants non budgétés."},
  {label:'Absence de frais annexes bloquants',detail:"Pas de charges non récupérables importantes, pas de travaux de copropriété votés à la charge du lot, pas de servitude ou contrainte inconnue."},
  {label:'Diagnostics conformes',detail:"Pas d'amiante non traité, pas de mérules ni termites actifs, pas de plomb, pas de problème structurel majeur."},
  {label:'Locataire solide',detail:"Pas d'impayés de loyer, aucun contentieux avec le bailleur, entreprise solvable, bail respecté."},
];
const VERDICT_RULES=[
  ['GO','Tous les critères bloquants sont conformes (ou inconnus mais non bloquants).'],
  ['ATTENTION','Un point d\'attention non bloquant, ou informations insuffisantes sur un critère bloquant.'],
  ['NO_GO','Au moins un critère bloquant est non conforme.'],
];

/* ── OBJECTIFS (ce qu'il faut pour atteindre le seuil) ── */
const ObjectifsPanel=({r,criteres,stCfg})=>{
  const loyer=parseAmt(r.loyerAnnuel),prixActuel=parseAmt(r.prixAcquisition),seuil=parseFloat(r.seuilRequis)||0;
  const [prixTest,setPrixTest]=useState(prixActuel||100000);
  const hasData=loyer>0&&prixActuel>0&&seuil>0;
  const prixMax=hasData?Math.round(loyer/(seuil/100)):0;
  const ecart=prixActuel-prixMax;
  const loyerMin=hasData?Math.round(prixActuel*seuil/100):0;
  const tauxTest=prixTest>0?(loyer/prixTest*100):0;
  const conformeTest=seuil>0?tauxTest>=seuil:false;
  const aResoudre=criteres.filter(c=>c.statut!=='ok');
  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:14}}>
      {hasData?(
        <div style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'20px 22px'}}>
          <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:14,display:'flex',alignItems:'center',gap:7}}><div style={{width:3,height:14,background:'#c9a227',borderRadius:2}}/>Rentabilité — ce qu'il faut pour être conforme</div>
          <p style={{fontSize:12,color:'#e0e0e0',lineHeight:1.7,margin:'0 0 16px'}}>
            {ecart>0
              ?<>Au loyer actuel de <strong style={{color:'#fff'}}>{fmtEur(loyer)}</strong>/an, il faut négocier le prix à <strong style={{color:'#22d3a0'}}>{fmtEur(prixMax)}</strong> maximum (soit <strong style={{color:'#ef4444'}}>−{fmtEur(ecart)}</strong>, −{(ecart/prixActuel*100).toFixed(1)}%) pour atteindre le seuil de rentabilité requis de {seuil}%.</>
              :<>Le prix actuel ({fmtEur(prixActuel)}) est déjà conforme au seuil de {seuil}% — marge de <strong style={{color:'#22d3a0'}}>{fmtEur(-ecart)}</strong> avant de repasser sous le seuil.</>}
          </p>
          <p style={{fontSize:11,color:'#999999',lineHeight:1.6,margin:'0 0 18px'}}>Alternative à prix constant : il faudrait un loyer annuel d'au moins <strong style={{color:'#e0e0e0'}}>{fmtEur(loyerMin)}</strong> {loyer<loyerMin?`(soit +${fmtEur(loyerMin-loyer)})`:'— déjà atteint'}.</p>
          <div style={{background:'#121212',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,padding:'16px 18px'}}>
            <SliderRow label="Prix négocié à tester" value={prixTest} min={Math.max(10000,Math.round(prixMax*0.7))} max={Math.round(prixActuel*1.15)} step={1000} unit="€" onChange={setPrixTest}/>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:6}}>
              <span style={{fontSize:11,color:'#999999'}}>Rentabilité résultante :</span>
              <span style={{fontSize:14,fontWeight:800,color:conformeTest?'#22d3a0':'#ef4444'}}>{tauxTest.toFixed(2)}%</span>
              <span style={{fontSize:10,color:conformeTest?'#22d3a0':'#ef4444',background:conformeTest?'rgba(34,211,160,.1)':'rgba(239,68,68,.1)',border:`1px solid ${conformeTest?'rgba(34,211,160,.25)':'rgba(239,68,68,.25)'}`,borderRadius:5,padding:'2px 8px',fontWeight:700}}>{conformeTest?'Conforme':'Non conforme'}</span>
            </div>
          </div>
        </div>
      ):(
        <div style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'20px 22px'}}>
          <p style={{fontSize:12,color:'#999999',margin:0}}>Loyer, prix d'acquisition ou seuil requis manquants dans l'analyse — impossible de calculer un objectif de négociation.</p>
        </div>
      )}
      <div style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'20px 22px'}}>
        <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:14,display:'flex',alignItems:'center',gap:7}}><div style={{width:3,height:14,background:'#c9a227',borderRadius:2}}/>Autres points à lever avant GO</div>
        {aResoudre.length===0?(
          <p style={{fontSize:12,color:'#22d3a0',margin:0}}>Tous les autres critères sont conformes.</p>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {aResoudre.map((c,i)=>{const sc=stCfg[c.statut]||stCfg.inconnu;return(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:9,background:sc.bg,border:`1px solid ${sc.border}`,borderRadius:10,padding:'11px 13px'}}>
                <div style={{width:18,height:18,borderRadius:5,background:sc.bg,border:`1px solid ${sc.border}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}><Ic n={sc.icon} s={9} c={sc.color}/></div>
                <div><span style={{fontSize:12,fontWeight:600,color:'#ffffff'}}>{c.label}</span><p style={{fontSize:11,color:'#c0c0c0',margin:'3px 0 0',lineHeight:1.55}}>{c.detail}</p></div>
              </div>
            );})}
          </div>
        )}
      </div>
    </div>
  );
};
const VerdictScreen=({data,onReset})=>{
  const [tab,setTab]=useState('verdict');
  const [showMethod,setShowMethod]=useState(false);
  const vRaw=data.verdict||'';const v=vRaw.replace('-','_').toUpperCase();
  const sCfg={
    GO:{color:'#22d3a0',bg:'rgba(34,211,160,.08)',border:'rgba(34,211,160,.2)',dot:'#22d3a0'},
    ATTENTION:{color:'#c9a227',bg:'rgba(201,162,39,.08)',border:'rgba(201,162,39,.2)',dot:'#c9a227'},
    NO_GO:{color:'#ef4444',bg:'rgba(239,68,68,.08)',border:'rgba(239,68,68,.2)',dot:'#ef4444'},
  }[v]||{color:'#777777',bg:'rgba(255,255,255,.04)',border:'rgba(255,255,255,.1)',dot:'#777777'};
  const sLabel={GO:'Conforme',ATTENTION:'À vérifier',NO_GO:'Non conforme'}[v]||'—';
  const stCfg={
    ok:{icon:'check',color:'#22d3a0',bg:'rgba(34,211,160,.05)',border:'rgba(34,211,160,.14)',label:'Conforme'},
    ko:{icon:'x',color:'#ef4444',bg:'rgba(239,68,68,.05)',border:'rgba(239,68,68,.14)',label:'Non conforme'},
    attention:{icon:'alert',color:'#c9a227',bg:'rgba(201,162,39,.05)',border:'rgba(201,162,39,.14)',label:'À vérifier'},
    inconnu:{icon:'question',color:'#555555',bg:'rgba(255,255,255,.02)',border:'rgba(255,255,255,.06)',label:'Inconnu'},
  };
  const criteres=data.criteres||[];const risques=data.risques||[];const positifs=data.points_positifs||[];const manquants=data.documents_manquants||[];
  // Rentabilité recalculée en JS (même formule que le simulateur) plutôt que l'arithmétique du LLM, pour garantir un chiffre identique entre le rapport et le simulateur.
  const r=useMemo(()=>{
    const r0=data.rentabilite||{};
    const loyer=parseAmt(r0.loyerAnnuel),prix=parseAmt(r0.prixAcquisition),seuil=parseFloat(r0.seuilRequis)||0;
    if(!loyer||!prix)return r0;
    const taux=(loyer/prix*100).toFixed(2);
    return{...r0,taux,conforme:seuil>0?parseFloat(taux)>=seuil:r0.conforme};

  const tabStyle=k=>({borderRadius:8,padding:'7px 16px',fontSize:12,fontWeight:600,color:tab===k?'#ffffff':'#505050',background:tab===k?'rgba(255,255,255,.06)':'transparent',border:tab===k?'1px solid rgba(255,255,255,.09)':'1px solid transparent'});

    <div style={{minHeight:'calc(100vh - 54px)',padding:'22px 26px 60px'}}>

          <button className="tab-btn" style={tabStyle('verdict')} onClick={()=>setTab('verdict')}>Rapport d'analyse</button>
          <button className="tab-btn" style={tabStyle('objectifs')} onClick={()=>setTab('objectifs')}>Objectifs</button>
          <button className="tab-btn" style={tabStyle('simulateur')} onClick={()=>setTab('simulateur')}>Simulateur financier</button>
        </div>
        {tab==='verdict'&&(
          <div className="anim-fade">
            <div style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'22px 26px',marginBottom:16}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:20}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,flexWrap:'wrap'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,background:sCfg.bg,border:`1px solid ${sCfg.border}`,borderRadius:7,padding:'4px 10px'}}>
                      <div style={{width:6,height:6,borderRadius:'50%',background:sCfg.dot}}/>
                      <span style={{fontSize:11,fontWeight:700,color:sCfg.color}}>{sLabel}</span>
                    </div>
                    {r.taux&&<div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:7,padding:'4px 10px'}}><span style={{fontSize:10,color:'#999999'}}>Rentabilité</span><span style={{fontSize:12,fontWeight:700,color:r.conforme?'#22d3a0':'#ef4444'}}>{r.taux}%</span><span style={{fontSize:10,color:'#888888'}}>/ seuil {r.seuilRequis}%</span></div>}
                    {r.loyerAnnuel&&<div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:7,padding:'4px 10px'}}><span style={{fontSize:10,color:'#999999'}}>Loyer</span><span style={{fontSize:12,fontWeight:700,color:'#ffffff'}}>{r.loyerAnnuel}</span></div>}
                    {r.prixAcquisition&&<div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:7,padding:'4px 10px'}}><span style={{fontSize:10,color:'#999999'}}>Prix</span><span style={{fontSize:12,fontWeight:700,color:'#ffffff'}}>{r.prixAcquisition}</span></div>}
                  </div>
                  <p style={{fontSize:13,color:'#ffffff',lineHeight:1.7,margin:0,maxWidth:820}}>{data.synthese||'—'}</p>
                </div>
                <button className="btn-g" onClick={onReset} style={{borderRadius:9,padding:'7px 14px',fontSize:12,color:'#777777',display:'flex',alignItems:'center',gap:6,flexShrink:0}}><Ic n="back" s={11} c="#555555"/>Nouveau</button>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:7,marginTop:16,paddingTop:14,borderTop:'1px solid rgba(255,255,255,.05)'}}>
                <Ic n="info" s={12} c="#666666"/>
                <span style={{fontSize:11,color:'#777777'}}>Synthèse automatisée destinée à faciliter votre décision — elle ne s'y substitue pas. Vérifiez les sources indiquées avant tout engagement.</span>
              </div>
            </div>
            {data.localisation?.adresse&&(
              <div className="anim-fade" style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:16,padding:'18px 20px',marginBottom:16}}>
                <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:12,display:'flex',alignItems:'center',gap:7}}><div style={{width:3,height:14,background:'#c9a227',borderRadius:2}}/>Emplacement</div>
                <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                  <iframe title="Localisation du bien" src={`https://www.google.com/maps?q=${encodeURIComponent(data.localisation.adresse)}&output=embed`} width="320" height="220" style={{border:0,borderRadius:10,flexShrink:0,maxWidth:'100%'}} loading="lazy"/>
                  <div style={{flex:1,minWidth:240}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#ffffff',marginBottom:8}}>{data.localisation.adresse}</div>
                    <p style={{fontSize:11,color:'#e0e0e0',lineHeight:1.65,margin:0}}>{data.localisation.analyse}</p>
                    {data.localisation.source&&<div style={{marginTop:9,fontSize:10,color:'#666666'}}>Source : {data.localisation.source}</div>}
                  </div>
                </div>
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <div className="anim-d1">
                <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:10,display:'flex',alignItems:'center',gap:7}}><div style={{width:3,height:14,background:'#c9a227',borderRadius:2}}/>Critères d'investissement</div>
                <div style={{display:'flex',flexDirection:'column',gap:7}}>
                  {criteres.map((c,i)=>{const sc=stCfg[c.statut]||stCfg.inconnu;return(
                    <div key={i} style={{background:sc.bg,border:`1px solid ${sc.border}`,borderRadius:12,padding:'13px 15px'}}>
                      <div style={{display:'flex',alignItems:'flex-start',gap:9}}>
                        <div style={{width:20,height:20,borderRadius:6,background:sc.bg,border:`1px solid ${sc.border}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}><Ic n={sc.icon} s={10} c={sc.color}/></div>
                        <div style={{flex:1}}>
                          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}><span style={{fontSize:12,fontWeight:600,color:'#ffffff'}}>{c.label}</span>{c.bloquant&&c.statut==='ko'&&<span style={{fontSize:9,color:'#ef4444',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:4,padding:'1px 5px',fontWeight:700}}>BLOQUANT</span>}<span style={{fontSize:10,color:sc.color,marginLeft:'auto',fontWeight:600}}>{sc.label}</span></div>
                          <p style={{fontSize:11,color:'#e0e0e0',margin:0,lineHeight:1.6}}>{c.detail}</p>
                          {c.source&&<div style={{fontSize:9.5,color:'#666666',marginTop:6}}>Source : {c.source}</div>}
                        </div>
                      </div>
                    </div>
                  );})}
                </div>
              </div>
              <div className="anim-d2" style={{display:'flex',flexDirection:'column',gap:10}}>
                {r.taux&&(
                  <div style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:14,padding:'16px 18px'}}>
                    <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:10,display:'flex',alignItems:'center',gap:7}}><div style={{width:3,height:14,background:'#c9a227',borderRadius:2}}/>Rentabilité</div>
                    {[['Taux calculé',`${r.taux}%`,r.conforme?'#22d3a0':'#ef4444'],['Seuil requis',`${r.seuilRequis}%`,'#c9a227'],['Loyer annuel',r.loyerAnnuel,'#d8d8d8'],["Prix d'acquisition",r.prixAcquisition,'#d8d8d8']].filter(x=>x[1]).map(([k,val,col],i,arr)=>(
                      <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:i<arr.length-1?'1px solid rgba(255,255,255,.04)':'none'}}><span style={{fontSize:11,color:'#b0b0b0'}}>{k}</span><span style={{fontSize:12,fontWeight:600,color:col}}>{val}</span></div>
                    ))}
                    {r.detail&&<p style={{fontSize:11,color:'#e0e0e0',lineHeight:1.6,margin:'10px 0 0'}}>{r.detail}</p>}
                    {r.source&&<div style={{fontSize:9.5,color:'#666666',marginTop:7}}>Source : {r.source}</div>}
                  </div>
                )}
                {risques.length>0&&(
                  <div style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:14,padding:'14px 16px'}}>
                    <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:9,display:'flex',alignItems:'center',gap:7}}><div style={{width:3,height:14,background:'#ef4444',borderRadius:2}}/>Risques</div>
                    {risques.map((r,i)=><div key={i} style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:i<risques.length-1?8:0}}><Ic n="alert" s={11} c="#ef4444"/><span style={{fontSize:11,color:'#e8e8e8',lineHeight:1.55}}>{r}</span></div>)}
                  </div>
                )}
                {positifs.length>0&&(
                  <div style={{background:'#1b1b1b',border:'1px solid rgba(255,255,255,.07)',borderRadius:14,padding:'14px 16px'}}>
                    <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:9,display:'flex',alignItems:'center',gap:7}}><div style={{width:3,height:14,background:'#22d3a0',borderRadius:2}}/>Points positifs</div>

                  </div>
                )}
              </div>
            </div>
            <div style={{marginTop:14}}>
              <AccSection title="Méthodologie" sub="Critères, seuils et règles de verdict appliqués" isOpen={showMethod} onToggle={()=>setShowMethod(s=>!s)}>
                <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
                  {METHODOLOGIE.map((m,i)=>(
                    <div key={i} style={{display:'flex',gap:9}}>
                      <span style={{fontSize:11,fontWeight:700,color:'#c9a227',flexShrink:0}}>{i+1}.</span>
                      <div><span style={{fontSize:12,fontWeight:600,color:'#ffffff'}}>{m.label}</span><p style={{fontSize:11,color:'#b0b0b0',margin:'2px 0 0',lineHeight:1.6}}>{m.detail}</p></div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:'#888888',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:8}}>Règles de verdict</div>

      </div>
    </div>
  );
};

/* ── APP ── */
const App=()=>{
  const [screen,setScreen]=useState('idle');const [payload,setPayload]=useState(null);const [result,setResult]=useState(null);const [error,setError]=useState('');
  const reset=()=>{setScreen('idle');setPayload(null);setResult(null);setError('');};
  return(
    <div style={{minHeight:'100vh',background:'#080808'}}>
      <Header onReset={reset} showBack={screen!=='idle'}/>
      {screen==='idle'&&<Landing onAnalyze={p=>{setPayload(p);setScreen('loading');}} onDemo={()=>{setPayload({_demo:true,documents:[{type:'bail',filename:'bail_commercial_lyon.pdf'}],additionalInfo:''});setScreen('loading');}}/>}
      {screen==='loading'&&<Loading payload={payload} onComplete={d=>{setResult(d);setScreen('verdict');}} onError={m=>{setError(m);setScreen('error');}}/>}
      {screen==='verdict'&&<VerdictScreen data={result} onReset={reset}/>}
      {screen==='error'&&<ErrorScreen message={error} onBack={reset}/>}
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
